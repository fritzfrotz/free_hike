# Tracker janitor — rules enforcement + debt/bug tracking (docs/tracker_tags.md).
# CI is the real enforcement; the pre-commit hook is fast local feedback.
name: tracker-janitor

on:
  push:
  pull_request:

jobs:
  janitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Janitor self-test
        run: node --test scripts/tracker-janitor.test.mjs
      - name: Tracker check (tags, mirrors, forbidden patterns, TRACKER.md drift)
        run: node scripts/tracker-janitor.mjs --check

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npx tsc -b
      - name: Lint
        run: npm run lint
      - name: Seam tests (vitest)
        run: npm test
